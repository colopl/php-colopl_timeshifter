name: CI macOS
on:
  workflow_call:
    inputs:
      artifact_name:
        required: true
        type: string
      artifact_run_id:
        required: true
        type: string
      archive_name:
        required: true
        type: string
jobs:
  init:
    runs-on: ubuntu-24.04
    outputs:
      needs-init: ${{ steps.check.outputs.needs-init }}
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/source-archive
          run-id: ${{ inputs.artifact_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract prepared workspace
        env:
          ARCHIVE_NAME: ${{ inputs.archive_name }}
        run: |
          ARCHIVE_PATH="${RUNNER_TEMP}/source-archive/${ARCHIVE_NAME}"
          tar -xzf "${ARCHIVE_PATH}" --strip-components=1 -C "${GITHUB_WORKSPACE}"
          rm -f "${ARCHIVE_PATH}"
      - name: Check if initialization is needed
        id: check
        run: |
          if test -f "ext/.gitkeep" && test "$(cat "ext/.gitkeep")" = "pskel_uninitialized"; then
            echo "needs-init=true" >> $GITHUB_OUTPUT
          else
            echo "needs-init=false" >> $GITHUB_OUTPUT
          fi
      - name: Initialize extension
        if: steps.check.outputs.needs-init == 'true'
        run: |
          docker compose run -v"$(pwd)/ext:/ext" --rm shell pskel init example
      - name: Upload initialized extension
        if: steps.check.outputs.needs-init == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: initialized-ext-macos
          path: ext/
          retention-days: 1
  macOS:
    needs: init
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on:
          - macos-15
          - macos-15-intel
          - macos-26
        version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        ts: ['ts', 'nts']
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/source-archive
          run-id: ${{ inputs.artifact_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract prepared workspace
        env:
          ARCHIVE_NAME: ${{ inputs.archive_name }}
        run: |
          ARCHIVE_PATH="${RUNNER_TEMP}/source-archive/${ARCHIVE_NAME}"
          tar -xzf "${ARCHIVE_PATH}" --strip-components=1 -C "${GITHUB_WORKSPACE}"
          rm -f "${ARCHIVE_PATH}"
      - name: Download initialized extension
        if: needs.init.outputs.needs-init == 'true'
        uses: actions/download-artifact@v8
        with:
          name: initialized-ext-macos
          path: ext/
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.version }}
          extensions: pdo, pdo_sqlite, pdo_mysql
        env:
          phpts: ${{ matrix.ts }}
      - name: Setup MySQL 8.0
        uses: shogo82148/actions-setup-mysql@076e636c45996ec8cb1a455c65f9f5364aeebd8a # v1.52.1
        with:
          mysql-version: '8.0'
          user: testing
          password: testing
          my-cnf: |
            default-authentication-plugin=mysql_native_password
      - name: Setup MySQL 8.0 compatibility endpoint for TiDB PDO tests
        uses: shogo82148/actions-setup-mysql@076e636c45996ec8cb1a455c65f9f5364aeebd8a # v1.52.1
        with:
          mysql-version: '8.0'
          my-cnf: |
            port=4000
            default-authentication-plugin=mysql_native_password
      - name: Configure MySQL test database
        run: |
          {
            echo "127.0.0.1 mysql"
            echo "127.0.0.1 tidb"
          } | sudo tee -a /etc/hosts
          mysql --protocol=tcp --ssl-mode=DISABLED --host=127.0.0.1 --port=3306 --user=root --execute="CREATE DATABASE IF NOT EXISTS testing;"
          mysql --protocol=tcp --ssl-mode=DISABLED --host=mysql --port=3306 --user=testing --password=testing testing --execute="SELECT VERSION();"
          mysql --protocol=tcp --ssl-mode=DISABLED --host=tidb --port=4000 --user=root mysql --execute="SELECT VERSION();"
      - name: Test extension
        run: |
          cd "ext"
          phpize
          ./configure --with-php-config="$(which "php-config")"
          make -j"$(sysctl -n hw.ncpu)"
          NO_INTERACTION=1 REPORT_EXIT_STATUS=1 make test
          cd -
