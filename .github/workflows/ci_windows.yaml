name: CI Windows
on:
  workflow_call:
    inputs:
      artifact_name:
        required: true
        type: string
      artifact_run_id:
        required: true
        type: string
      archive_name:
        required: true
        type: string
jobs:
  init:
    runs-on: ubuntu-24.04
    outputs:
      needs-init: ${{ steps.check.outputs.needs-init }}
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/source-archive
      - name: Extract prepared workspace
        env:
          ARCHIVE_NAME: ${{ inputs.archive_name }}
        run: |
          ARCHIVE_PATH="${RUNNER_TEMP}/source-archive/${ARCHIVE_NAME}"
          tar -xzf "${ARCHIVE_PATH}" --strip-components=1 -C "${GITHUB_WORKSPACE}"
          rm -f "${ARCHIVE_PATH}"
      - name: Check if initialization is needed
        id: check
        run: |
          if test -f "ext/.gitkeep" && test "$(cat "ext/.gitkeep")" = "pskel_uninitialized"; then
            echo "needs-init=true" >> $GITHUB_OUTPUT
          else
            echo "needs-init=false" >> $GITHUB_OUTPUT
          fi
      - name: Initialize extension
        if: steps.check.outputs.needs-init == 'true'
        run: |
          docker compose run -v"$(pwd)/ext:/ext" --rm shell pskel init example
      - name: Upload initialized extension
        if: steps.check.outputs.needs-init == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: initialized-ext-windows
          path: ext/
          retention-days: 1
  Windows:
    needs: init
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on:
          - windows-2022
        version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        arch: ['x64', 'x86']
        ts: ['ts', 'nts']
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/source-archive
      - name: Extract prepared workspace
        shell: pwsh
        env:
          ARCHIVE_NAME: ${{ inputs.archive_name }}
        run: |
          $downloadDir = Join-Path $env:RUNNER_TEMP "source-archive"
          $archivePath = Join-Path $downloadDir $env:ARCHIVE_NAME
          tar.exe -xzf $archivePath -C $env:GITHUB_WORKSPACE --strip-components=1
          Remove-Item $archivePath
      - name: Download initialized extension
        if: needs.init.outputs.needs-init == 'true'
        uses: actions/download-artifact@v8
        with:
          name: initialized-ext-windows
          path: ext\
      - name: Extract extension name
        id: ext-name
        shell: pwsh
        run: |
          $pattern = 'EXTENSION\(\s*["'']([^"'']+)["'']'
          $config = Get-Content -Raw .\ext\config.w32
          $match = [regex]::Match($config, $pattern)
          if (-not $match.Success) {
            throw "Unable to find EXTENSION name in ext\config.w32"
          }
          $name = $match.Groups[1].Value
          echo "name=$name" >> $env:GITHUB_OUTPUT
      - name: Setup PHP
        id: setup-php
        uses: php/setup-php-sdk@e2ce1c294f272ed93e8083f14649f5adadf93788 # v0.12
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          cache: true
      - name: Setup MySQL 8.0
        uses: shogo82148/actions-setup-mysql@9c42ca180d5f1dd4dceb54c23c5eda0384f4d265 # v1.50.0
        with:
          mysql-version: '8.0'
          user: testing
          password: testing
          my-cnf: |
            default-authentication-plugin=mysql_native_password
      - name: Setup MySQL 8.0 compatibility endpoint for TiDB PDO tests
        uses: shogo82148/actions-setup-mysql@9c42ca180d5f1dd4dceb54c23c5eda0384f4d265 # v1.50.0
        with:
          mysql-version: '8.0'
          my-cnf: |
            port=4000
            default-authentication-plugin=mysql_native_password
      - name: Configure MySQL test database
        shell: pwsh
        run: |
          Add-Content -Path "$env:SystemRoot\System32\drivers\etc\hosts" -Value "`n127.0.0.1 mysql`n127.0.0.1 tidb"
          mysql --protocol=tcp --ssl-mode=DISABLED --host=127.0.0.1 --port=3306 --user=root --execute="CREATE DATABASE IF NOT EXISTS testing;"
          mysql --protocol=tcp --ssl-mode=DISABLED --host=mysql --port=3306 --user=testing --password=testing testing --execute="SELECT VERSION();"
          mysql --protocol=tcp --ssl-mode=DISABLED --host=tidb --port=4000 --user=root mysql --execute="SELECT VERSION();"
      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: ${{ matrix.arch }}
          toolset: ${{ steps.setup-php.outputs.toolset }}
      - name: phpize and configure
        run: |
          cd "ext"
          phpize
          ./configure.bat --enable-${{ steps.ext-name.outputs.name }} --with-prefix=${{ steps.setup-php.outputs.prefix }}
      - name: Build and Test
        env:
          TEST_PHP_ARGS: '-q --show-diff'
        run: |
          cd "ext"
          nmake
          nmake test
